name: Run cleaning-sector turnover scan

# Manual trigger only — nothing runs on a schedule. Go to the Actions tab
# on GitHub, select this workflow, and click "Run workflow" to fire it.
on:
  workflow_dispatch:
    inputs:
      sic_codes:
        description: "SIC codes to scan (space-separated)"
        default: "81210 81220 81221 81222 81223 81229 81290"
        required: false
      discovery_mode:
        description: "Company discovery (stage 1): api (Advanced Search, fails past ~10k matches for a whole sector) or bulk (Free Company Data Product snapshot, no limit — recommended for sectors like cleaning)"
        type: choice
        options:
          - bulk
          - api
        default: bulk
      discovery_snapshot_date:
        description: "YYYY-MM-DD snapshot date for bulk discovery (blank = guess today's month; check download.companieshouse.gov.uk/en_output.html for the current filename if the guess is wrong)"
        default: ""
        required: false
      min_turnover:
        description: "Minimum turnover (GBP)"
        default: "5000000"
        required: false
      max_turnover:
        description: "Maximum turnover (GBP)"
        default: "35000000"
        required: false
      mode:
        description: "Scan mode: api (per-company, slower, always current) or bulk (monthly archive, faster, needs correct month)"
        type: choice
        options:
          - bulk
          - api
        default: bulk
      api_company_limit:
        description: "Safety cap on companies processed in API mode (blank = no cap; a full SIC-code sweep can be thousands of companies and take hours)"
        default: "500"
        required: false
      bulk_month:
        description: "Anchor YYYY-MM for bulk turnover-scan mode — the trailing 18 months up to and including this one are scanned (blank = today's month). Check download.companieshouse.gov.uk/en_accountsdata.html for the current filename pattern first."
        default: ""
        required: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover companies in scope (bulk mode)
        if: ${{ github.event.inputs.discovery_mode == 'bulk' }}
        run: |
          SNAPSHOT_DATE="${{ github.event.inputs.discovery_snapshot_date }}"
          if [ -z "$SNAPSHOT_DATE" ]; then
            SNAPSHOT_DATE=$(date -u +'%Y-%m-01')
          fi
          python src/discover_companies.py \
            --mode bulk \
            --date "$SNAPSHOT_DATE" \
            --sic ${{ github.event.inputs.sic_codes }} \
            --status active -v

      - name: Discover companies in scope (API mode)
        if: ${{ github.event.inputs.discovery_mode == 'api' }}
        run: |
          python src/discover_companies.py \
            --mode api \
            --sic ${{ github.event.inputs.sic_codes }} \
            --status active -v
        env:
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}

      - name: Run turnover scan (API mode)
        if: ${{ github.event.inputs.mode == 'api' }}
        run: |
          LIMIT_ARG=""
          if [ -n "${{ github.event.inputs.api_company_limit }}" ]; then
            LIMIT_ARG="--limit ${{ github.event.inputs.api_company_limit }}"
          fi
          python src/scan_turnover.py \
            --min-turnover ${{ github.event.inputs.min_turnover }} \
            --max-turnover ${{ github.event.inputs.max_turnover }} \
            $LIMIT_ARG -v
        env:
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}

      - name: Run turnover scan (bulk mode, trailing 18 months)
        if: ${{ github.event.inputs.mode == 'bulk' }}
        run: |
          # A single month's Accounts Data Product only contains accounts
          # *filed* that month — since each company files once a year on its
          # own schedule, one month alone would only cover ~1/12 of
          # companies. Loop back over the trailing 18 months (anchored on
          # bulk_month, or today's month if blank) and --append each one so
          # results.csv accumulates well over a full year's worth of filings
          # (extra headroom over 12 catches companies that filed late or
          # whose accounting reference date shifted).
          ANCHOR="${{ github.event.inputs.bulk_month }}"
          if [ -z "$ANCHOR" ]; then
            ANCHOR=$(date -u +'%Y-%m')
          fi
          ANCHOR_DATE="${ANCHOR}-01"
          APPEND_FLAG=""
          for i in $(seq 0 17); do
            MONTH=$(date -u -d "$ANCHOR_DATE -$i month" +'%Y-%m')
            echo "=== Scanning month $MONTH ==="
            if python src/bulk_scan.py \
                --month "$MONTH" \
                --min-turnover ${{ github.event.inputs.min_turnover }} \
                --max-turnover ${{ github.event.inputs.max_turnover }} \
                $APPEND_FLAG -v; then
              APPEND_FLAG="--append"
            else
              echo "::warning::Skipping $MONTH — archive unavailable or scan failed"
            fi
          done

      - name: Look up ownership for matched companies (bulk mode)
        if: ${{ github.event.inputs.mode == 'bulk' }}
        run: |
          python src/enrich_ownership.py -v
        env:
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}

      - name: Find gap companies (bulk mode)
        if: ${{ github.event.inputs.discovery_mode == 'bulk' && github.event.inputs.mode == 'bulk' }}
        run: |
          python src/find_gap_companies.py

      - name: Export dashboard JSON
        run: |
          python src/export_dashboard_json.py \
            --min-turnover ${{ github.event.inputs.min_turnover }} \
            --max-turnover ${{ github.event.inputs.max_turnover }} \
            --mode ${{ github.event.inputs.mode }}

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/results.json
          git diff --staged --quiet || git commit -m "Update dashboard data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          # This job can run for a long time (the bulk scan downloads up to
          # 18 monthly archives), so main may well have moved on since
          # actions/checkout ran at the start — rebase onto the latest
          # remote main before pushing so an unrelated commit elsewhere
          # doesn't reject this push.
          success=0
          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase origin/main && git push; then
              success=1
              break
            fi
            echo "::warning::Push attempt $attempt failed (main moved again), retrying..."
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          if [ "$success" -ne 1 ]; then
            echo "::error::Failed to push dashboard data after 3 attempts"
            exit 1
          fi
